{{- $email := .Get "email" -}}
{{- $phone := .Get "phone" -}}
<span class="contact-icons">
{{- if $phone -}}
  {{- $telHref := replaceRE "[^0-9+]" "" $phone -}}
  <a href="tel:{{ $telHref }}" aria-label="Call" title="{{ $phone }}" class="contact-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
  </a>
{{- end -}}
{{- if $email -}}
  {{- $parts := split $email "@" -}}
  {{- $user := index $parts 0 -}}
  {{- $domain := index $parts 1 -}}
  <a href="#" data-u="{{ $user }}" data-d="{{ $domain }}" aria-label="Email" class="contact-icon contact-email" onclick="this.href='mailto:'+this.dataset.u+'\u0040'+this.dataset.d;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </a>
{{- end -}}
</span>
